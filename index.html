<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Medborgerskabsprøven – Quiz</title>

<style>
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f7f8fa;
  margin: 0;
  padding: 0;
}

h1 {
  text-align: center;
  margin: 30px 0 10px 0;
}

/* Card */
#app {
  max-width: 700px;
  margin: 0 auto 50px auto;
  background: white;
  padding: 30px;
  border-radius: 14px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);

  height: 620px;
  display: flex;
  flex-direction: column;
  box-sizing: border-box;   /* FIX */
}

/* Layout */
#quiz-wrapper {
  flex: 1;
  display: flex;
  flex-direction: column;
}

#question-box {
  flex: 1;
  overflow-y: auto;
}

#feedback {
  margin-top: 20px;
  min-height: 60px;
}

#quiz-footer {
  margin-top: 20px;
}

/* Buttons */
button {
  display: block;
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  font-size: 15px;
  border-radius: 8px;
  border: none;
  background: #2563eb;
  color: white;
  cursor: pointer;
  transition: 0.2s ease;
  box-sizing: border-box;   /* FIX */
}

button:hover {
  background: #1d4ed8;
}

button.secondary {
  background: #e5e7eb;
  color: #111;
}

button.secondary:hover {
  background: #d1d5db;
}

hr {
  margin: 20px 0;
}

#timer {
  font-weight: bold;
  text-align: right;
}
</style>
</head>

<body>

<h1>Medborgerskabsprøven – Quiz</h1>

<div id="app">Indlæser...</div>

<script src="app.js"></script>
</body>
</html>
